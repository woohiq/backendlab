<!DOCTYPE html>
<html lang="ko">
<head>

  <style>
    html, body {

      font-family: 'Segoe UI', sans-serif;
      background: #111;
    }

    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header a {
      text-decoration: none;
      color: #111;
      font-weight: 700;
    }

    .right {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .note {
      font-size: 12px;
      color: #444;
      white-space: nowrap;
    }

    .frame-wrap {
      height: calc(100vh - 56px);
      width: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
